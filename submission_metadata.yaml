ai_usage_summary: |
  AI tools assisted research, design discussion, and code review, with all
  engineering decisions verified against the data and the validator:
  - Cursor + Claude: pairing on dataset analysis, scoring design, and code review.
  - ml-intern (HF-based agent): read-only adversarial audit of the methodology and
    top-100 reasoning.
  - Azure OpenAI text-embedding-3-large: used in the PRECOMPUTE step to score the
    deduplicated role-history documents and titles against JD-derived contrastive
    anchors. This produces frozen CSV artifacts.
  Embeddings are used ONLY in precompute. The official ranker (rank_ursi_fl.py) loads
  no model, makes no API calls, is deterministic, CPU-only, and offline; it reads
  only candidates.jsonl plus the committed CSV artifacts. The official score uses a
  single semantic signal (career-history role evidence); skills/summaries are never
  scored, so keyword-stuffed skill sections have no effect.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  URSI-FL (Unified Role Semantic Index, fixed-leak anchors; promoted variant
  FL-E) treats ranking as hybrid retrieval. The JD becomes a frozen multi-anchor
  contrastive query (7 positive/negative evidence facets). The candidate pool's
  career-history documents deduplicate to 44 unique role descriptions and 48
  titles (discovered, not assumed); each unique role document is scored ONCE
  with Azure text-embedding-3-large, contrasting JD positive vs negative
  anchors and rank-percentile normalizing within the discovered corpus. Role
  evidence is projected to candidates by recency, duration, currentness,
  breadth, and a semantic title-coherence guard. The offline CPU-only ranker
  combines this single career-evidence signal with the candidate's strongest
  raw role-document evidence, plus structured business gates: India/visa,
  behavioral availability (last-active, open-to-work, recruiter
  responsiveness, notice period, market activity), seniority, title
  coherence, consulting/tenure guards, and a bounded [0.99-1.02] confirmation
  from Redrob-verified skill assessments. Profile summaries and skill names
  are embedded only for false-positive diagnostics and are never scored, so
  keyword-stuffed skills cannot rescue a weak profile. Structural
  impossibilities and tech anachronisms force a score of 0 (95 caught, 0 in
  top 100). No manual template grades or keyword lexicons are used in the
  official path. The top-100 is 100% India-based, all technical, and stable
  to dropping any single JD anchor (Jaccard@100 0.87-1.0).

