name: Sync to HuggingFace Space

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Remove binary assets before HF push
        run: |
          git rm -rf --cached assets/ 2>/dev/null || true
          git commit --allow-empty -m "Strip binary assets for HF Space" --author="github-actions[bot] <github-actions[bot]@users.noreply.github.com>" || true
      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://tyb343:$HF_TOKEN@huggingface.co/spaces/tyb343/India-runs-submission master:main --force
