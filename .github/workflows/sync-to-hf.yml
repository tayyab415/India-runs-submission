name: Sync to HuggingFace Space

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Build clean tree and push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Remove binary assets that HF rejects
          rm -rf assets/
          # Create a fresh single-commit branch with no binary history
          git checkout --orphan hf-deploy
          git rm -rf --cached . > /dev/null 2>&1 || true
          git add -A
          git commit -m "Sync from GitHub $(git rev-parse --short HEAD@{1})" \
            --author="github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push https://tyb343:$HF_TOKEN@huggingface.co/spaces/tyb343/India-runs-submission hf-deploy:main --force
