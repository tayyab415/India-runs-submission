<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="980" viewBox="0 0 1536 980" role="img" aria-labelledby="title desc">
  <title id="title">Stage A precompute deep dive</title>
  <desc id="desc">Detailed Stage A architecture showing how JD anchors, candidates, role templates, embeddings, contrast scoring, and frozen artifacts are produced.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5f6b7a"/>
    </marker>
    <style>
      .bg { fill: #fbfdff; }
      .title { font: 700 52px Inter, Arial, sans-serif; fill: #0b1220; }
      .subtitle { font: 400 19px Inter, Arial, sans-serif; fill: #334155; }
      .panel { fill: #ffffff; stroke-width: 1.4; rx: 10; filter: url(#shadow); }
      .blue { stroke: #2563eb; }
      .teal { stroke: #0891b2; }
      .purple { stroke: #7c3aed; }
      .stage-blue { font: 700 26px Inter, Arial, sans-serif; fill: #2563eb; }
      .stage-teal { font: 700 26px Inter, Arial, sans-serif; fill: #0f949b; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 8; }
      .box-blue { fill: #1f6feb; stroke: #1f6feb; rx: 8; }
      .box-teal { fill: #0f9fa6; stroke: #0f9fa6; rx: 8; }
      .box-orange { fill: #f97316; stroke: #f97316; rx: 8; }
      .box-dash { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.25; stroke-dasharray: 6 6; rx: 8; }
      .label { font: 600 17px Inter, Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Inter, Arial, sans-serif; fill: #334155; }
      .label-white { font: 600 17px Inter, Arial, sans-serif; fill: #ffffff; }
      .small-white { font: 400 14px Inter, Arial, sans-serif; fill: #eaf7ff; }
      .line { stroke: #5f6b7a; stroke-width: 1.35; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #94a3b8; stroke-width: 1.1; fill: none; marker-end: url(#arrow); }
      .foot { font: 400 17px Inter, Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="1536" height="980"/>
  <text class="title" x="768" y="66" text-anchor="middle">Stage A Deep Dive: Network-Allowed Precompute</text>
  <text class="subtitle" x="768" y="100" text-anchor="middle">The only embedding step: score the small discovered corpus once, then freeze local artifacts for the offline ranker.</text>

  <rect class="panel blue" x="28" y="140" width="356" height="680"/>
  <text class="stage-blue" x="206" y="180" text-anchor="middle">Inputs</text>
  <rect class="box" x="68" y="224" width="276" height="66"/>
  <text class="label" x="206" y="250" text-anchor="middle">candidates.jsonl</text>
  <text class="small" x="206" y="274" text-anchor="middle">100K profiles, 300,171 role rows</text>
  <rect class="box-blue" x="68" y="324" width="276" height="72"/>
  <text class="label-white" x="206" y="352" text-anchor="middle">JD anchor pack</text>
  <text class="small-white" x="206" y="376" text-anchor="middle">7 positive/negative facets</text>
  <rect class="box" x="68" y="430" width="276" height="72"/>
  <text class="label" x="206" y="458" text-anchor="middle">Release-date table</text>
  <text class="small" x="206" y="482" text-anchor="middle">anachronism checks shared with ranker</text>
  <rect class="box-dash" x="68" y="628" width="276" height="84"/>
  <text class="small" x="206" y="656" text-anchor="middle">Precompute may use network</text>
  <text class="small" x="206" y="680" text-anchor="middle">because its outputs are cached</text>
  <text class="small" x="206" y="704" text-anchor="middle">and committed before ranking.</text>

  <path class="line" d="M384 480 H432"/>

  <rect class="panel teal" x="432" y="140" width="430" height="680"/>
  <text class="stage-teal" x="647" y="180" text-anchor="middle">Corpus reduction</text>
  <rect class="box-teal" x="488" y="226" width="318" height="70"/>
  <text class="label-white" x="647" y="254" text-anchor="middle">Deduplicate career descriptions</text>
  <text class="small-white" x="647" y="278" text-anchor="middle">content hash over role text</text>
  <path class="line" d="M647 296 V336"/>
  <rect class="box-blue" x="488" y="336" width="318" height="78"/>
  <text class="label-white" x="647" y="365" text-anchor="middle">44 role-description templates</text>
  <text class="small-white" x="647" y="390" text-anchor="middle">the main semantic evidence units</text>
  <path class="line" d="M647 414 V454"/>
  <rect class="box-teal" x="488" y="454" width="318" height="70"/>
  <text class="label-white" x="647" y="482" text-anchor="middle">48 title templates</text>
  <text class="small-white" x="647" y="506" text-anchor="middle">coherence / contradiction guard</text>
  <rect class="box-dash" x="488" y="602" width="318" height="88"/>
  <text class="small" x="647" y="632" text-anchor="middle">Summaries and skills are embedded</text>
  <text class="small" x="647" y="656" text-anchor="middle">for diagnostics only, not as</text>
  <text class="small" x="647" y="680" text-anchor="middle">positive scoring evidence.</text>

  <path class="line" d="M862 480 H910"/>

  <rect class="panel blue" x="910" y="140" width="330" height="680"/>
  <text class="stage-blue" x="1075" y="180" text-anchor="middle">Semantic scoring</text>
  <rect class="box-blue" x="950" y="226" width="250" height="74"/>
  <text class="label-white" x="1075" y="254" text-anchor="middle">Azure OpenAI</text>
  <text class="small-white" x="1075" y="279" text-anchor="middle">text-embedding-3-large</text>
  <path class="line" d="M1075 300 V338"/>
  <rect class="box" x="950" y="338" width="250" height="78"/>
  <text class="label" x="1075" y="366" text-anchor="middle">Facet contrast</text>
  <text class="small" x="1075" y="391" text-anchor="middle">positive − 0.70 × negative</text>
  <path class="line" d="M1075 416 V454"/>
  <rect class="box" x="950" y="454" width="250" height="78"/>
  <text class="label" x="1075" y="482" text-anchor="middle">Percentile normalize</text>
  <text class="small" x="1075" y="507" text-anchor="middle">within the 44-template corpus</text>
  <path class="line" d="M1075 532 V570"/>
  <rect class="box-teal" x="950" y="570" width="250" height="78"/>
  <text class="label-white" x="1075" y="598" text-anchor="middle">Project to candidates</text>
  <text class="small-white" x="1075" y="623" text-anchor="middle">recency, duration, currentness, breadth</text>

  <path class="line" d="M1240 480 H1288"/>

  <rect class="panel teal" x="1288" y="140" width="220" height="680"/>
  <text class="stage-teal" x="1398" y="180" text-anchor="middle">Frozen outputs</text>
  <rect class="box-orange" x="1318" y="224" width="160" height="64"/>
  <text class="label-white" x="1398" y="250" text-anchor="middle">candidate_role</text>
  <text class="small-white" x="1398" y="272" text-anchor="middle">projection.csv</text>
  <rect class="box" x="1318" y="318" width="160" height="64"/>
  <text class="label" x="1398" y="344" text-anchor="middle">unique_role</text>
  <text class="small" x="1398" y="366" text-anchor="middle">scores.csv</text>
  <rect class="box" x="1318" y="412" width="160" height="64"/>
  <text class="label" x="1398" y="438" text-anchor="middle">jd_anchor</text>
  <text class="small" x="1398" y="460" text-anchor="middle">pack.json</text>
  <rect class="box" x="1318" y="506" width="160" height="64"/>
  <text class="label" x="1398" y="532" text-anchor="middle">manifest</text>
  <text class="small" x="1398" y="554" text-anchor="middle">+ validation</text>
  <rect class="box-dash" x="1318" y="634" width="160" height="82"/>
  <text class="small" x="1398" y="662" text-anchor="middle">These files are</text>
  <text class="small" x="1398" y="686" text-anchor="middle">the only semantic</text>
  <text class="small" x="1398" y="710" text-anchor="middle">input at ranking.</text>

  <rect class="panel purple" x="28" y="846" width="1480" height="70"/>
  <text class="stage-blue" x="78" y="889">Boundary</text>
  <text class="foot" x="768" y="889" text-anchor="middle">After Stage A, no API, model, embedding dependency, or network call is needed to reproduce the submission.</text>
</svg>
