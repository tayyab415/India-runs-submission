<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="980" viewBox="0 0 1536 980" role="img" aria-labelledby="title desc">
  <title id="title">Stage B offline ranker deep dive</title>
  <desc id="desc">Detailed Stage B architecture showing the offline ranker inputs, base fit computation, business gates, honeypot zeroing, ordering, and submission output.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5f6b7a"/>
    </marker>
    <style>
      .bg { fill: #fbfdff; }
      .title { font: 700 52px Inter, Arial, sans-serif; fill: #0b1220; }
      .subtitle { font: 400 19px Inter, Arial, sans-serif; fill: #334155; }
      .panel { fill: #ffffff; stroke-width: 1.4; rx: 10; filter: url(#shadow); }
      .blue { stroke: #2563eb; }
      .teal { stroke: #0891b2; }
      .purple { stroke: #7c3aed; }
      .red { stroke: #ef4444; }
      .stage-blue { font: 700 26px Inter, Arial, sans-serif; fill: #2563eb; }
      .stage-teal { font: 700 26px Inter, Arial, sans-serif; fill: #0f949b; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 8; }
      .box-blue { fill: #1f6feb; stroke: #1f6feb; rx: 8; }
      .box-teal { fill: #0f9fa6; stroke: #0f9fa6; rx: 8; }
      .box-orange { fill: #f97316; stroke: #f97316; rx: 8; }
      .box-red { fill: #fff7f7; stroke: #ef4444; stroke-width: 1.4; rx: 8; }
      .box-dash { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.25; stroke-dasharray: 6 6; rx: 8; }
      .label { font: 600 17px Inter, Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Inter, Arial, sans-serif; fill: #334155; }
      .label-white { font: 600 17px Inter, Arial, sans-serif; fill: #ffffff; }
      .small-white { font: 400 14px Inter, Arial, sans-serif; fill: #eaf7ff; }
      .line { stroke: #5f6b7a; stroke-width: 1.35; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #94a3b8; stroke-width: 1.1; fill: none; marker-end: url(#arrow); }
      .foot { font: 400 17px Inter, Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="1536" height="980"/>
  <text class="title" x="768" y="66" text-anchor="middle">Stage B Deep Dive: Official Offline Ranker</text>
  <text class="subtitle" x="768" y="100" text-anchor="middle">The graded path is deterministic Python: read candidates plus frozen artifacts, apply gates, emit the top-100 CSV.</text>

  <rect class="panel blue" x="28" y="140" width="308" height="690"/>
  <text class="stage-blue" x="182" y="180" text-anchor="middle">Offline inputs</text>
  <rect class="box" x="66" y="226" width="232" height="68"/>
  <text class="label" x="182" y="253" text-anchor="middle">candidates.jsonl</text>
  <text class="small" x="182" y="277" text-anchor="middle">raw candidate records</text>
  <rect class="box" x="66" y="328" width="232" height="68"/>
  <text class="label" x="182" y="355" text-anchor="middle">candidate_role_projection</text>
  <text class="small" x="182" y="379" text-anchor="middle">CES, months, best doc id</text>
  <rect class="box" x="66" y="430" width="232" height="68"/>
  <text class="label" x="182" y="457" text-anchor="middle">unique_role_scores</text>
  <text class="small" x="182" y="481" text-anchor="middle">raw template evidence</text>
  <rect class="box-dash" x="66" y="622" width="232" height="82"/>
  <text class="small" x="182" y="650" text-anchor="middle">No model load</text>
  <text class="small" x="182" y="674" text-anchor="middle">No network</text>
  <text class="small" x="182" y="698" text-anchor="middle">No third-party packages</text>

  <path class="line" d="M336 486 H382"/>

  <rect class="panel teal" x="382" y="140" width="372" height="690"/>
  <text class="stage-teal" x="568" y="180" text-anchor="middle">Base fit</text>
  <rect class="box-teal" x="430" y="224" width="276" height="70"/>
  <text class="label-white" x="568" y="252" text-anchor="middle">0.60 × career evidence</text>
  <text class="small-white" x="568" y="276" text-anchor="middle">projected role-template signal</text>
  <rect class="box-blue" x="430" y="328" width="276" height="76"/>
  <text class="label-white" x="568" y="356" text-anchor="middle">0.25 × effective best role</text>
  <text class="small-white" x="568" y="381" text-anchor="middle">raw evidence gated by coverage</text>
  <rect class="box-teal" x="430" y="438" width="276" height="70"/>
  <text class="label-white" x="568" y="466" text-anchor="middle">0.15 × relevant experience</text>
  <text class="small-white" x="568" y="490" text-anchor="middle">months of JD-aligned work</text>
  <path class="line" d="M568 508 V558"/>
  <rect class="box" x="430" y="558" width="276" height="86"/>
  <text class="label" x="568" y="586" text-anchor="middle">base_fit</text>
  <text class="small" x="568" y="611" text-anchor="middle">technical fit before logistics</text>
  <text class="small" x="568" y="635" text-anchor="middle">and risk gates</text>

  <path class="line" d="M754 486 H800"/>

  <rect class="panel teal" x="800" y="140" width="372" height="690"/>
  <text class="stage-teal" x="986" y="180" text-anchor="middle">JD business gates</text>
  <rect class="box" x="848" y="218" width="276" height="56"/>
  <text class="label" x="986" y="253" text-anchor="middle">location / relocation</text>
  <rect class="box" x="848" y="294" width="276" height="56"/>
  <text class="label" x="986" y="329" text-anchor="middle">availability behavior</text>
  <rect class="box" x="848" y="370" width="276" height="56"/>
  <text class="label" x="986" y="405" text-anchor="middle">work mode + notice period</text>
  <rect class="box" x="848" y="446" width="276" height="56"/>
  <text class="label" x="986" y="481" text-anchor="middle">experience prior</text>
  <rect class="box" x="848" y="522" width="276" height="56"/>
  <text class="label" x="986" y="557" text-anchor="middle">title contradiction guard</text>
  <rect class="box" x="848" y="598" width="276" height="56"/>
  <text class="label" x="986" y="633" text-anchor="middle">consulting + tenure gates</text>
  <rect class="box" x="848" y="674" width="276" height="56"/>
  <text class="label" x="986" y="709" text-anchor="middle">verified assessment nudge</text>

  <path class="line" d="M1172 486 H1218"/>

  <rect class="panel blue" x="1218" y="140" width="290" height="690"/>
  <text class="stage-blue" x="1363" y="180" text-anchor="middle">Output shaping</text>
  <rect class="box-red" x="1252" y="224" width="222" height="74"/>
  <text class="label" x="1363" y="252" text-anchor="middle">Honeypot?</text>
  <text class="small" x="1363" y="277" text-anchor="middle">structural impossibility → 0</text>
  <path class="line" d="M1363 298 V334"/>
  <rect class="box-blue" x="1252" y="334" width="222" height="76"/>
  <text class="label-white" x="1363" y="362" text-anchor="middle">Final score</text>
  <text class="small-white" x="1363" y="387" text-anchor="middle">base fit × all gates</text>
  <path class="line" d="M1363 410 V446"/>
  <rect class="box" x="1252" y="446" width="222" height="76"/>
  <text class="label" x="1363" y="474" text-anchor="middle">Sort deterministically</text>
  <text class="small" x="1363" y="499" text-anchor="middle">score desc, candidate_id asc</text>
  <path class="line" d="M1363 522 V558"/>
  <rect class="box-teal" x="1252" y="558" width="222" height="76"/>
  <text class="label-white" x="1363" y="586" text-anchor="middle">Grounded reasoning</text>
  <text class="small-white" x="1363" y="611" text-anchor="middle">actual role evidence + concerns</text>
  <path class="line" d="M1363 634 V670"/>
  <rect class="box-orange" x="1252" y="670" width="222" height="72"/>
  <text class="label-white" x="1363" y="698" text-anchor="middle">submission.csv</text>
  <text class="small-white" x="1363" y="723" text-anchor="middle">100 ranked rows</text>

  <rect class="panel purple" x="28" y="856" width="1480" height="70"/>
  <text class="stage-blue" x="78" y="899">Invariant</text>
  <text class="foot" x="768" y="899" text-anchor="middle">Ranking quality is decided by career-history evidence first; skills and summaries cannot rescue a weak or impossible profile.</text>
</svg>
